<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShopX</title>
    <script src="index.js"></script>
    <link rel="stylesheet" href="page2.css">
</head>
<body>

<header class="header">
    <h1>ShopX</h1>

    <div class="search-box">
        <input id="search" type="text" placeholder="Search products...">
        <button onclick="searchProducts()">Search</button>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="cart">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<div class="container">

    <aside class="filters">
        <h3>Filter by Category</h3>

        <label>
            <input class="filter" type="checkbox" value="headphones" onchange="filterProducts()">
            Headphones
        </label>

        <label>
            <input class="filter" type="checkbox" value="speakers" onchange="filterProducts()">
            Speakers
        </label>
    </aside>

    <main class="content">

        <div class="top-bar">
            <h2>Products</h2>

            <select onchange="sortProducts(this.value)">
                <option value="">Sort by</option>
                <option value="low-high">Price Low → High</option>
                <option value="high-low">Price High → Low</option>
            </select>
        </div>

        <section id="product-list" class="products"></section>

    </main>

</div>

<footer>
    <p>© 2026 ShopX</p>
</footer>

</body>
</html>
